<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>製品登録システム</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f4f8; color: #333; }

  /* ナビ */
  .nav { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 12px 20px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .nav button { background: rgba(255,255,255,0.2); color: #fff; border: 1px solid rgba(255,255,255,0.3); padding: 8px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; transition: background 0.2s; }
  .nav button:hover, .nav button.active { background: rgba(255,255,255,0.4); }
  .nav .title { color: #fff; font-size: 18px; font-weight: bold; margin-right: 20px; }

  /* ページ */
  .page { display: none; max-width: 900px; margin: 20px auto; padding: 0 16px; }
  .page.active { display: block; }

  /* カード */
  .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 24px; margin-bottom: 20px; }
  .card h2 { color: #667eea; margin-bottom: 16px; font-size: 20px; }

  /* フォーム */
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-weight: 600; margin-bottom: 4px; font-size: 14px; color: #555; }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; transition: border-color 0.2s;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #667eea; outline: none; }

  /* ボタン */
  .btn { padding: 10px 24px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.2s; }
  .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(102,126,234,0.4); }
  .btn-danger { background: #e74c3c; color: #fff; }
  .btn-danger:hover { background: #c0392b; }
  .btn-success { background: #27ae60; color: #fff; }
  .btn-success:hover { background: #219a52; }
  .btn-sm { padding: 6px 14px; font-size: 13px; }

  /* テーブル */
  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #eee; font-size: 14px; }
  th { background: #f8f9ff; color: #667eea; font-weight: 600; position: sticky; top: 0; }
  tr:hover { background: #f8f9ff; }

  /* トースト */
  .toast { position: fixed; bottom: 30px; right: 30px; padding: 14px 28px; border-radius: 10px; color: #fff; font-weight: 600; z-index: 9999; opacity: 0; transition: opacity 0.4s; font-size: 14px; }
  .toast.show { opacity: 1; }
  .toast.success { background: #27ae60; }
  .toast.error { background: #e74c3c; }

  /* 明細 */
  .detail-row { background: #f8f9ff; border: 1px solid #e0e4f0; border-radius: 10px; padding: 16px; margin-bottom: 12px; position: relative; }
  .detail-row .detail-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .detail-row .detail-header span { font-weight: 700; color: #667eea; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 16px; }
  .detail-grid .full { grid-column: 1 / -1; }
  .detail-grid label { font-size: 12px; color: #888; margin-bottom: 2px; display: block; }
  .detail-grid input, .detail-grid select { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; }
  .detail-grid input:focus, .detail-grid select:focus { border-color: #667eea; outline: none; }
  .subtotal-row { display: flex; gap: 16px; margin-top: 8px; font-size: 13px; color: #555; font-weight: 600; }
  .subtotal-row span { background: #eef1fb; padding: 4px 10px; border-radius: 6px; }

  /* 合計バー */
  .total-bar { display: flex; gap: 20px; justify-content: flex-end; align-items: center; flex-wrap: wrap; padding: 16px 0; }
  .total-bar .total-item { font-size: 15px; font-weight: 700; color: #667eea; background: #eef1fb; padding: 8px 16px; border-radius: 8px; }

  /* ローディング */
  .loading { text-align: center; padding: 40px; color: #999; }
</style>
</head>
<body>

<!-- ナビ -->
<div class="nav">
  <span class="title">製品登録システム</span>
  <button onclick="showPage('register')" id="nav-register">登録</button>
  <button onclick="showPage('list')" id="nav-list">一覧</button>
  <button onclick="showPage('customer')" id="nav-customer">顧客管理</button>
  <button onclick="showPage('master')" id="nav-master">マスタ管理</button>
</div>

<!-- ====== 登録ページ ====== -->
<div class="page" id="page-register">
  <div class="card">
    <h2>📋 プロジェクト登録</h2>

    <div style="display:flex; gap:16px; flex-wrap:wrap;">
      <div class="form-group" style="flex:0 0 120px;">
        <label>PID</label>
        <input type="text" id="reg-pid" readonly style="background:#eef1fb; font-weight:700; color:#667eea;">
      </div>
      <div class="form-group" style="flex:1; min-width:200px;">
        <label>プロジェクト名</label>
        <input type="text" id="reg-project-name" placeholder="プロジェクト名を入力">
      </div>
      <div class="form-group" style="flex:1; min-width:200px;">
        <label>顧客</label>
        <select id="reg-customer"></select>
      </div>
    </div>

    <hr style="border:none; border-top:1px solid #eee; margin:16px 0;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
      <h3 style="color:#555; font-size:16px;">製品明細</h3>
      <button class="btn btn-primary btn-sm" onclick="addDetailRow()">＋ 明細追加</button>
    </div>

    <div id="detail-container"></div>

    <div class="total-bar">
      <span class="total-item">合計 原価A: <span id="total-costA">0</span></span>
      <span class="total-item">合計 原価B: <span id="total-costB">0</span></span>
      <span class="total-item">合計 売価: <span id="total-price">0</span></span>
    </div>

    <div style="text-align:right; margin-top:8px;">
      <button class="btn btn-success" onclick="saveProject()" id="btn-save-project">💾 保存</button>
    </div>
  </div>
</div>

<!-- ====== 一覧ページ（Step4 placeholder） ====== -->
<div class="page" id="page-list">
  <div class="card">
    <h2>📄 プロジェクト一覧</h2>
    <p class="loading">Step 4 で実装予定</p>
  </div>
</div>

<!-- ====== 顧客管理ページ ====== -->
<div class="page" id="page-customer">
  <div class="card">
    <h2>👥 顧客管理</h2>
    <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px;">
      <div class="form-group" style="flex:0 0 100px;">
        <label>CID</label>
        <input type="text" id="cust-id" readonly style="background:#eee;">
      </div>
      <div class="form-group" style="flex:1; min-width:160px;">
        <label>顧客名</label>
        <input type="text" id="cust-name" placeholder="顧客名">
      </div>
      <div class="form-group" style="flex:1; min-width:160px;">
        <label>担当者</label>
        <input type="text" id="cust-contact" placeholder="担当者名">
      </div>
      <div class="form-group" style="flex:1; min-width:160px;">
        <label>メモ</label>
        <input type="text" id="cust-memo" placeholder="メモ">
      </div>
    </div>
    <div style="display:flex; gap:8px; margin-bottom:20px;">
      <button class="btn btn-primary" onclick="saveCust()">保存</button>
      <button class="btn btn-danger" onclick="deleteCust()">削除</button>
      <button class="btn" style="background:#bbb;color:#fff;" onclick="clearCustForm()">クリア</button>
    </div>
    <table>
      <thead><tr><th>CID</th><th>顧客名</th><th>担当者</th><th>メモ</th><th></th></tr></thead>
      <tbody id="cust-table"></tbody>
    </table>
  </div>
</div>

<!-- ====== マスタ管理ページ ====== -->
<div class="page" id="page-master">
  <div class="card">
    <h2>⚙️ マスタ管理</h2>
    <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px;">
      <div class="form-group" style="flex:1; min-width:180px;">
        <label>カテゴリ名</label>
        <input type="text" id="master-cat" placeholder="カテゴリ名">
      </div>
      <div class="form-group" style="flex:1; min-width:180px;">
        <label>タグ名</label>
        <input type="text" id="master-tag" placeholder="タグ名（空欄可）">
      </div>
    </div>
    <div style="display:flex; gap:8px; margin-bottom:20px;">
      <button class="btn btn-primary" onclick="addMasterTag()">タグ追加</button>
      <button class="btn btn-success" onclick="addMasterCategory()">カテゴリ追加</button>
    </div>
    <table>
      <thead><tr><th>MID</th><th>カテゴリ</th><th>タグ</th><th></th></tr></thead>
      <tbody id="master-table"></tbody>
    </table>
  </div>
</div>

<!-- トースト -->
<div class="toast" id="toast"></div>

<script>
const API = 'https://sheetdb.io/api/v1/16f9oq61xmnqu';
let masterData = [];
let customerData = [];
let detailIndex = 0;

// ========== ユーティリティ ==========
function toast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 3000);
}

function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  const navBtn = document.getElementById('nav-' + name);
  if (navBtn) navBtn.classList.add('active');

  if (name === 'customer') loadCustomers();
  if (name === 'master') loadMaster();
  if (name === 'register') initRegisterPage();
}

function nextId(list, prefix) {
  let max = 0;
  list.forEach(r => {
    const key = prefix === 'P' ? r.PID : prefix === 'C' ? r.CID : r.MID;
    if (key) {
      const n = parseInt(key.substring(1));
      if (n > max) max = n;
    }
  });
  return prefix + String(max + 1).padStart(3, '0');
}

// ========== 顧客管理 ==========
async function loadCustomers() {
  try {
    const res = await fetch(API + '?sheet=Customers');
    customerData = await res.json();
    const tb = document.getElementById('cust-table');
    tb.innerHTML = '';
    customerData.forEach(c => {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${c.CID}</td><td>${c.CustomerName}</td><td>${c.ContactPerson}</td><td>${c.Memo}</td>
        <td><button class="btn btn-sm btn-primary" onclick="editCust('${c.CID}')">編集</button></td>`;
      tb.appendChild(tr);
    });
  } catch(e) { toast('顧客読込エラー','error'); }
}

function editCust(cid) {
  const c = customerData.find(x => x.CID === cid);
  if (!c) return;
  document.getElementById('cust-id').value = c.CID;
  document.getElementById('cust-name').value = c.CustomerName;
  document.getElementById('cust-contact').value = c.ContactPerson;
  document.getElementById('cust-memo').value = c.Memo;
}

function clearCustForm() {
  ['cust-id','cust-name','cust-contact','cust-memo'].forEach(id => document.getElementById(id).value = '');
}

async function saveCust() {
  const cid = document.getElementById('cust-id').value;
  const data = {
    CustomerName: document.getElementById('cust-name').value.trim(),
    ContactPerson: document.getElementById('cust-contact').value.trim(),
    Memo: document.getElementById('cust-memo').value.trim()
  };
  if (!data.CustomerName) { toast('顧客名を入力','error'); return; }
  try {
    if (cid) {
      await fetch(API + '/CID/' + cid + '?sheet=Customers', {
        method: 'PATCH', headers: {'Content-Type':'application/json'}, body: JSON.stringify({data})
      });
      toast('顧客を更新しました');
    } else {
      data.CID = nextId(customerData, 'C');
      await fetch(API + '?sheet=Customers', {
        method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({data})
      });
      toast('顧客を追加しました');
    }
    clearCustForm();
    loadCustomers();
  } catch(e) { toast('保存エラー','error'); }
}

async function deleteCust() {
  const cid = document.getElementById('cust-id').value;
  if (!cid) { toast('削除対象を選択','error'); return; }
  if (!confirm(cid + ' を削除しますか？')) return;
  try {
    await fetch(API + '/CID/' + cid + '?sheet=Customers', { method: 'DELETE' });
    toast('削除しました');
    clearCustForm();
    loadCustomers();
  } catch(e) { toast('削除エラー','error'); }
}

// ========== マスタ管理 ==========
async function loadMaster() {
  try {
    const res = await fetch(API + '?sheet=Master');
    masterData = await res.json();
    const tb = document.getElementById('master-table');
    tb.innerHTML = '';
    masterData.forEach(m => {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${m.MID}</td><td>${m.CategoryName}</td><td>${m.TagName || '（なし）'}</td>
        <td><button class="btn btn-sm btn-danger" onclick="deleteMasterRow('${m.MID}','${m.CategoryName}','${m.TagName||''}')">削除</button></td>`;
      tb.appendChild(tr);
    });
  } catch(e) { toast('マスタ読込エラー','error'); }
}

async function addMasterCategory() {
  const cat = document.getElementById('master-cat').value.trim();
  if (!cat) { toast('カテゴリ名を入力','error'); return; }
  if (masterData.some(m => m.CategoryName === cat)) { toast('既に存在します','error'); return; }
  const mid = nextId(masterData, 'M');
  try {
    await fetch(API + '?sheet=Master', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({data: {MID: mid, CategoryName: cat, TagName: ''}})
    });
    toast('カテゴリ追加しました');
    document.getElementById('master-cat').value = '';
    loadMaster();
  } catch(e) { toast('追加エラー','error'); }
}

async function addMasterTag() {
  const cat = document.getElementById('master-cat').value.trim();
  const tag = document.getElementById('master-tag').value.trim();
  if (!cat || !tag) { toast('カテゴリとタグを入力','error'); return; }
  const catRows = masterData.filter(m => m.CategoryName === cat);
  if (catRows.length === 0) { toast('カテゴリが存在しません','error'); return; }
  if (catRows.some(m => m.TagName === tag)) { toast('タグが既に存在します','error'); return; }
  const emptyRow = catRows.find(m => !m.TagName);
  try {
    if (emptyRow) {
      await fetch(API + '/MID/' + emptyRow.MID + '?sheet=Master', {
        method: 'PATCH', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({data: {TagName: tag}})
      });
    } else {
      const mid = nextId(masterData, 'M');
      await fetch(API + '?sheet=Master', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({data: {MID: mid, CategoryName: cat, TagName: tag}})
      });
    }
    toast('タグ追加しました');
    document.getElementById('master-tag').value = '';
    loadMaster();
  } catch(e) { toast('追加エラー','error'); }
}

async function deleteMasterRow(mid, cat, tag) {
  const catRows = masterData.filter(m => m.CategoryName === cat);
  if (!tag) {
    if (!confirm('カテゴリ「' + cat + '」を全て削除しますか？')) return;
    try {
      for (const r of catRows) {
        await fetch(API + '/MID/' + r.MID + '?sheet=Master', { method: 'DELETE' });
      }
      toast('カテゴリ削除しました');
      loadMaster();
    } catch(e) { toast('削除エラー','error'); }
  } else {
    if (!confirm('タグ「' + tag + '」を削除しますか？')) return;
    const tagsInCat = catRows.filter(m => m.TagName);
    try {
      if (tagsInCat.length === 1) {
        await fetch(API + '/MID/' + mid + '?sheet=Master', {
          method: 'PATCH', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({data: {TagName: ''}})
        });
      } else {
        await fetch(API + '/MID/' + mid + '?sheet=Master', { method: 'DELETE' });
      }
      toast('タグ削除しました');
      loadMaster();
    } catch(e) { toast('削除エラー','error'); }
  }
}

// ========== 登録ページ ==========
async function initRegisterPage() {
  detailIndex = 0;
  document.getElementById('detail-container').innerHTML = '';
  document.getElementById('reg-project-name').value = '';
  updateTotals();

  // PID取得
  try {
    const res = await fetch(API + '?sheet=Products');
    const products = await res.json();
    document.getElementById('reg-pid').value = nextId(products, 'P');
  } catch(e) {
    document.getElementById('reg-pid').value = 'P001';
  }

  // 顧客プルダウン
  try {
    const res = await fetch(API + '?sheet=Customers');
    customerData = await res.json();
    const sel = document.getElementById('reg-customer');
    sel.innerHTML = '<option value="">-- 顧客を選択 --</option>';
    customerData.forEach(c => {
      sel.innerHTML += `<option value="${c.CID}">${c.CustomerName}（${c.CID}）</option>`;
    });
  } catch(e) { toast('顧客読込エラー','error'); }

  // マスタ読込
  try {
    const res = await fetch(API + '?sheet=Master');
    masterData = await res.json();
  } catch(e) { toast('マスタ読込エラー','error'); }

  // 初期明細1行
  addDetailRow();
}

function getCategoryList() {
  const cats = [];
  masterData.forEach(m => {
    if (m.CategoryName && !cats.includes(m.CategoryName)) cats.push(m.CategoryName);
  });
  return cats;
}

function getTagsForCategory(cat) {
  return masterData.filter(m => m.CategoryName === cat && m.TagName).map(m => m.TagName);
}

function addDetailRow() {
  detailIndex++;
  const idx = detailIndex;
  const cats = getCategoryList();
  const catOptions = '<option value="">-- カテゴリ --</option>' + cats.map(c => `<option value="${c}">${c}</option>`).join('');

  const div = document.createElement('div');
  div.className = 'detail-row';
  div.id = 'detail-' + idx;
  div.innerHTML = `
    <div class="detail-header">
      <span>明細 #${idx}</span>
      <button class="btn btn-danger btn-sm" onclick="removeDetailRow(${idx})">✕ 削除</button>
    </div>
    <div class="detail-grid">
      <div>
        <label>カテゴリ</label>
        <select id="d-cat-${idx}" onchange="onCategoryChange(${idx})">${catOptions}</select>
      </div>
      <div>
        <label>タグ</label>
        <select id="d-tag-${idx}"><option value="">-- タグ --</option></select>
      </div>
      <div class="full">
        <label>品名</label>
        <input type="text" id="d-name-${idx}" placeholder="製品名">
      </div>
      <div>
        <label>数量</label>
        <input type="number" id="d-qty-${idx}" value="1" min="1" oninput="calcSubtotal(${idx})">
      </div>
      <div>
        <label>原価A</label>
        <input type="number" id="d-costA-${idx}" value="0" oninput="calcSubtotal(${idx})">
      </div>
      <div>
        <label>原価B</label>
        <input type="number" id="d-costB-${idx}" value="0" oninput="calcSubtotal(${idx})">
      </div>
      <div>
        <label>売価</label>
        <input type="number" id="d-price-${idx}" value="0" oninput="calcSubtotal(${idx})">
      </div>
      <div class="full">
        <label>メモ</label>
        <input type="text" id="d-memo-${idx}" placeholder="メモ">
      </div>
    </div>
    <div class="subtotal-row">
      <span>小計 原価A: <span id="d-subA-${idx}">0</span></span>
      <span>小計 原価B: <span id="d-subB-${idx}">0</span></span>
      <span>小計 売価: <span id="d-subP-${idx}">0</span></span>
    </div>
  `;
  document.getElementById('detail-container').appendChild(div);
}

function removeDetailRow(idx) {
  const el = document.getElementById('detail-' + idx);
  if (el) el.remove();
  updateTotals();
}

function onCategoryChange(idx) {
  const cat = document.getElementById('d-cat-' + idx).value;
  const tagSel = document.getElementById('d-tag-' + idx);
  const tags = getTagsForCategory(cat);
  tagSel.innerHTML = '<option value="">-- タグ --</option>' + tags.map(t => `<option value="${t}">${t}</option>`).join('');
}

function calcSubtotal(idx) {
  const qty = parseFloat(document.getElementById('d-qty-' + idx).value) || 0;
  const costA = parseFloat(document.getElementById('d-costA-' + idx).value) || 0;
  const costB = parseFloat(document.getElementById('d-costB-' + idx).value) || 0;
  const price = parseFloat(document.getElementById('d-price-' + idx).value) || 0;
  document.getElementById('d-subA-' + idx).textContent = (qty * costA).toLocaleString();
  document.getElementById('d-subB-' + idx).textContent = (qty * costB).toLocaleString();
  document.getElementById('d-subP-' + idx).textContent = (qty * price).toLocaleString();
  updateTotals();
}

function updateTotals() {
  let totalA = 0, totalB = 0, totalP = 0;
  document.querySelectorAll('.detail-row').forEach(row => {
    const idx = row.id.replace('detail-', '');
    const qty = parseFloat(document.getElementById('d-qty-' + idx)?.value) || 0;
    const costA = parseFloat(document.getElementById('d-costA-' + idx)?.value) || 0;
    const costB = parseFloat(document.getElementById('d-costB-' + idx)?.value) || 0;
    const price = parseFloat(document.getElementById('d-price-' + idx)?.value) || 0;
    totalA += qty * costA;
    totalB += qty * costB;
    totalP += qty * price;
  });
  document.getElementById('total-costA').textContent = totalA.toLocaleString();
  document.getElementById('total-costB').textContent = totalB.toLocaleString();
  document.getElementById('total-price').textContent = totalP.toLocaleString();
}

function getDetailRows() {
  const rows = [];
  document.querySelectorAll('.detail-row').forEach(row => {
    const idx = row.id.replace('detail-', '');
    const qty = parseFloat(document.getElementById('d-qty-' + idx).value) || 0;
    const costA = parseFloat(document.getElementById('d-costA-' + idx).value) || 0;
    const costB = parseFloat(document.getElementById('d-costB-' + idx).value) || 0;
    const price = parseFloat(document.getElementById('d-price-' + idx).value) || 0;
    rows.push({
      Category: document.getElementById('d-cat-' + idx).value,
      Tag: document.getElementById('d-tag-' + idx).value,
      ProductName: document.getElementById('d-name-' + idx).value.trim(),
      Qty: String(qty),
      CostA: String(costA),
      CostB: String(costB),
      Price: String(price),
      SubtotalA: String(qty * costA),
      SubtotalB: String(qty * costB),
      SubtotalPrice: String(qty * price),
      Memo: document.getElementById('d-memo-' + idx).value.trim()
    });
  });
  return rows;
}

async function saveProject() {
  const pid = document.getElementById('reg-pid').value;
  const projectName = document.getElementById('reg-project-name').value.trim();
  const cid = document.getElementById('reg-customer').value;

  if (!projectName) { toast('プロジェクト名を入力してください','error'); return; }
  if (!cid) { toast('顧客を選択してください','error'); return; }

  const details = getDetailRows();
  if (details.length === 0) { toast('明細を1行以上追加してください','error'); return; }

  const hasEmpty = details.some(d => !d.ProductName);
  if (hasEmpty) { toast('品名が空の明細があります','error'); return; }

  const btn = document.getElementById('btn-save-project');
  btn.disabled = true;
  btn.textContent = '保存中...';

  try {
    // Products シートに明細を保存
    const productRows = details.map(d => ({
      PID: pid,
      ProjectName: projectName,
      Category: d.Category,
      Tag: d.Tag,
      ProductName: d.ProductName,
      Qty: d.Qty,
      CostA: d.CostA,
      CostB: d.CostB,
      Price: d.Price,
      SubtotalA: d.SubtotalA,
      SubtotalB: d.SubtotalB,
      SubtotalPrice: d.SubtotalPrice,
      Memo: d.Memo
    }));

    await fetch(API + '?sheet=Products', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ data: productRows })
    });

    // ProjectCustomer シートに紐付けを保存
    await fetch(API + '?sheet=ProjectCustomer', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ data: { PID: pid, CID: cid } })
    });

    toast('プロジェクト ' + pid + ' を保存しました');

    // フォームリセット → 次のPIDで新規登録
    initRegisterPage();

  } catch(e) {
    toast('保存エラー: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '💾 保存';
  }
}

// ========== 初期表示 ==========
showPage('register');
</script>
