<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Register</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; }

nav { background: #1a73e8; padding: 12px 20px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
nav button {
  background: rgba(255,255,255,0.15); color: #fff; border: none; padding: 8px 20px;
  border-radius: 6px; cursor: pointer; font-size: 14px; transition: background 0.2s;
}
nav button:hover { background: rgba(255,255,255,0.3); }
nav button.active { background: #fff; color: #1a73e8; font-weight: bold; }

.page { display: none; padding: 20px; max-width: 900px; margin: 0 auto; }
.page.active { display: block; }

.card {
  background: #fff; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  padding: 20px; margin-bottom: 16px;
}
.card h2 { color: #1a73e8; margin-bottom: 16px; font-size: 18px; }

.form-group { margin-bottom: 12px; }
.form-group label { display: block; font-weight: bold; margin-bottom: 4px; font-size: 13px; color: #555; }
.form-group input, .form-group textarea {
  width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px;
}
.form-group textarea { height: 60px; resize: vertical; }

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.btn {
  padding: 8px 20px; border: none; border-radius: 6px; cursor: pointer;
  font-size: 14px; transition: background 0.2s;
}
.btn-primary { background: #1a73e8; color: #fff; }
.btn-primary:hover { background: #1557b0; }
.btn-danger { background: #e74c3c; color: #fff; }
.btn-danger:hover { background: #c0392b; }
.btn-secondary { background: #95a5a6; color: #fff; }
.btn-secondary:hover { background: #7f8c8d; }

table { width: 100%; border-collapse: collapse; margin-top: 12px; }
th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #eee; font-size: 13px; }
th { background: #f8f9fa; font-weight: bold; color: #555; }
tr:hover { background: #f8f9fa; }

.loading { text-align: center; padding: 40px; color: #999; }
.toast {
  position: fixed; bottom: 20px; right: 20px; background: #333; color: #fff;
  padding: 12px 24px; border-radius: 8px; display: none; z-index: 1000;
  animation: fadeIn 0.3s;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<nav>
  <button onclick="showPage('register')" id="nav-register">商品登録</button>
  <button onclick="showPage('list')" id="nav-list">一覧</button>
  <button onclick="showPage('master')" id="nav-master">マスタ管理</button>
  <button onclick="showPage('customer')" id="nav-customer">顧客管理</button>
</nav>

<!-- ===== 商品登録ページ ===== -->
<div id="page-register" class="page">
  <div class="card"><h2>�icing 商品登録</h2><p>（Step 3で実装）</p></div>
</div>

<!-- ===== 一覧ページ ===== -->
<div id="page-list" class="page">
  <div class="card"><h2>📋 一覧</h2><p>（Step 4で実装）</p></div>
</div>

<!-- ===== マスタ管理ページ ===== -->
<div id="page-master" class="page">
  <div class="card"><h2>⚙️ マスタ管理</h2><p>（Step 2で実装）</p></div>
</div>

<!-- ===== 顧客管理ページ ===== -->
<div id="page-customer" class="page">
  <div class="card">
    <h2>👥 顧客管理</h2>
    <div class="form-row">
      <div class="form-group">
        <label>顧客名</label>
        <input type="text" id="c-name" placeholder="例：テスト株式会社">
      </div>
      <div class="form-group">
        <label>担当者</label>
        <input type="text" id="c-contact" placeholder="例：山田太郎">
      </div>
    </div>
    <div class="form-group">
      <label>メモ</label>
      <textarea id="c-memo" placeholder="備考を入力"></textarea>
    </div>
    <button class="btn btn-primary" onclick="saveCustomer()">登録</button>
    <button class="btn btn-secondary" onclick="clearCustomerForm()" style="margin-left:8px;">クリア</button>
  </div>

  <div class="card">
    <h2>顧客一覧</h2>
    <div id="customer-table"><div class="loading">読み込み中...</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://sheetdb.io/api/v1/16f9oq61xmnqu';
let customers = [];
let editingCID = null;

// ===== ページ切替 =====
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');

  if (name === 'customer') loadCustomers();
}

// ===== トースト =====
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2500);
}

// ===== 顧客読込 =====
async function loadCustomers() {
  try {
    const res = await fetch(API + '?sheet=Customers');
    customers = await res.json();
    renderCustomers();
  } catch (e) {
    document.getElementById('customer-table').innerHTML = '<p style="color:red;">読み込みエラー</p>';
  }
}

// ===== 顧客表示 =====
function renderCustomers() {
  if (customers.length === 0) {
    document.getElementById('customer-table').innerHTML = '<p style="color:#999;">顧客データがありません</p>';
    return;
  }
  let html = '<table><tr><th>CID</th><th>顧客名</th><th>担当者</th><th>メモ</th><th>操作</th></tr>';
  customers.forEach(c => {
    html += `<tr>
      <td>${c.CID}</td>
      <td>${c.CustomerName}</td>
      <td>${c.ContactPerson}</td>
      <td>${c.Memo}</td>
      <td>
        <button class="btn btn-primary" style="padding:4px 12px;font-size:12px;" onclick="editCustomer('${c.CID}')">編集</button>
        <button class="btn btn-danger" style="padding:4px 12px;font-size:12px;margin-left:4px;" onclick="deleteCustomer('${c.CID}')">削除</button>
      </td>
    </tr>`;
  });
  html += '</table>';
  document.getElementById('customer-table').innerHTML = html;
}

// ===== 次のCID生成 =====
function nextCID() {
  if (customers.length === 0) return 'C001';
  const nums = customers.map(c => parseInt(c.CID.replace('C', ''))).filter(n => !isNaN(n));
  const max = Math.max(...nums);
  return 'C' + String(max + 1).padStart(3, '0');
}

// ===== 顧客保存 =====
async function saveCustomer() {
  const name = document.getElementById('c-name').value.trim();
  const contact = document.getElementById('c-contact').value.trim();
  const memo = document.getElementById('c-memo').value.trim();

  if (!name) { toast('顧客名を入力してください'); return; }

  try {
    if (editingCID) {
      await fetch(API + '/CID/' + editingCID + '?sheet=Customers', {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ data: { CustomerName: name, ContactPerson: contact, Memo: memo } })
      });
      toast('更新しました');
      editingCID = null;
    } else {
      const cid = nextCID();
      await fetch(API + '?sheet=Customers', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ data: { CID: cid, CustomerName: name, ContactPerson: contact, Memo: memo } })
      });
      toast('登録しました: ' + cid);
    }
    clearCustomerForm();
    loadCustomers();
  } catch (e) {
    toast('エラーが発生しました');
  }
}

// ===== 顧客編集 =====
function editCustomer(cid) {
  const c = customers.find(x => x.CID === cid);
  if (!c) return;
  document.getElementById('c-name').value = c.CustomerName;
  document.getElementById('c-contact').value = c.ContactPerson;
  document.getElementById('c-memo').value = c.Memo;
  editingCID = cid;
  toast('編集モード: ' + cid);
}

// ===== 顧客削除 =====
async function deleteCustomer(cid) {
  if (!confirm(cid + ' を削除しますか？')) return;
  try {
    await fetch(API + '/CID/' + cid + '?sheet=Customers', { method: 'DELETE' });
    toast('削除しました');
    loadCustomers();
  } catch (e) {
    toast('削除エラー');
  }
}

// ===== フォームクリア =====
function clearCustomerForm() {
  document.getElementById('c-name').value = '';
  document.getElementById('c-contact').value = '';
  document.getElementById('c-memo').value = '';
  editingCID = null;
}

// ===== 初期表示 =====
showPage('customer');
</script>
</body>
</html>
