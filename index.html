<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>製品登録システム</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f4f8; color: #333; }
  .nav { background: linear-gradient(135deg, #1a5276, #2980b9); padding: 12px 20px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
  .nav button { background: rgba(255,255,255,0.15); color: #fff; border: 1px solid rgba(255,255,255,0.3); padding: 10px 22px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.2s; }
  .nav button:hover { background: rgba(255,255,255,0.25); }
  .nav button.active { background: #fff; color: #1a5276; font-weight: 700; }
  .nav .title { color: #fff; font-size: 20px; font-weight: 700; margin-right: 20px; }
  .page { display: none; max-width: 900px; margin: 30px auto; padding: 0 20px; }
  .page.active { display: block; }
  .card { background: #fff; border-radius: 10px; padding: 28px; margin-bottom: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  .card h2 { color: #1a5276; margin-bottom: 20px; font-size: 20px; border-bottom: 2px solid #2980b9; padding-bottom: 10px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-weight: 600; margin-bottom: 6px; color: #1a5276; font-size: 14px; }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; padding: 10px 14px; border: 2px solid #dce6f0; border-radius: 6px; font-size: 14px; transition: border-color 0.2s;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: #2980b9; }
  .form-row { display: flex; gap: 16px; flex-wrap: wrap; }
  .form-row .form-group { flex: 1; min-width: 200px; }
  .btn { padding: 10px 24px; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .btn-primary { background: #2980b9; color: #fff; }
  .btn-primary:hover { background: #1a6fa0; }
  .btn-danger { background: #e74c3c; color: #fff; }
  .btn-danger:hover { background: #c0392b; }
  .btn-success { background: #27ae60; color: #fff; }
  .btn-success:hover { background: #1e8449; }
  .btn-sm { padding: 6px 14px; font-size: 12px; }
  .btn-group { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
  table { width: 100%; border-collapse: collapse; margin-top: 16px; }
  th { background: #1a5276; color: #fff; padding: 12px 14px; text-align: left; font-size: 13px; }
  td { padding: 10px 14px; border-bottom: 1px solid #e8e8e8; font-size: 13px; }
  tr:hover { background: #f5f9fc; }
  .toast { position: fixed; top: 20px; right: 20px; padding: 14px 24px; border-radius: 8px; color: #fff; font-weight: 600; z-index: 9999; opacity: 0; transition: opacity 0.3s; font-size: 14px; }
  .toast.show { opacity: 1; }
  .toast.success { background: #27ae60; }
  .toast.error { background: #e74c3c; }
  .master-section { margin-bottom: 20px; padding: 16px; background: #f8fafc; border-radius: 8px; border: 1px solid #e0e8f0; }
  .master-section h3 { color: #2980b9; margin-bottom: 12px; font-size: 16px; }
  .inline-form { display: flex; gap: 10px; align-items: end; flex-wrap: wrap; }
  .inline-form .form-group { margin-bottom: 0; }
  .master-table-section { margin-top: 20px; }
  .master-table-section h3 { color: #1a5276; margin-bottom: 12px; font-size: 16px; border-bottom: 1px solid #dce6f0; padding-bottom: 8px; }
  .category-group { margin-bottom: 16px; }
  .category-header { background: #eaf2f8; padding: 10px 14px; font-weight: 700; color: #1a5276; border-radius: 6px 6px 0 0; border: 1px solid #d4e6f1; display: flex; justify-content: space-between; align-items: center; }
  .tag-list { border: 1px solid #d4e6f1; border-top: none; border-radius: 0 0 6px 6px; }
  .tag-item { padding: 8px 14px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; font-size: 13px; }
  .tag-item:last-child { border-bottom: none; }
  .tag-item:hover { background: #f5f9fc; }
  .no-tags { padding: 8px 14px; color: #999; font-style: italic; font-size: 13px; }
  .loading { text-align: center; padding: 20px; color: #999; }
</style>
</head>
<body>

<div class="nav">
  <span class="title">製品登録システム</span>
  <button onclick="showPage('register')" id="nav-register">登録</button>
  <button onclick="showPage('list')" id="nav-list">一覧</button>
  <button onclick="showPage('master')" id="nav-master">マスタ管理</button>
  <button onclick="showPage('customer')" id="nav-customer">顧客管理</button>
</div>

<div class="page" id="page-register">
  <div class="card">
    <h2>📝 製品登録</h2>
    <p>Step 3で実装予定</p>
  </div>
</div>

<div class="page" id="page-list">
  <div class="card">
    <h2>📋 製品一覧</h2>
    <p>Step 4で実装予定</p>
  </div>
</div>

<div class="page" id="page-master">
  <div class="card">
    <h2>⚙️ マスタ管理</h2>

    <div class="master-section">
      <h3>カテゴリ追加</h3>
      <div class="inline-form">
        <div class="form-group" style="flex:1;">
          <input type="text" id="newCategory" placeholder="新しいカテゴリ名">
        </div>
        <button class="btn btn-primary" onclick="addCategory()">追加</button>
      </div>
    </div>

    <div class="master-section">
      <h3>タグ追加</h3>
      <div class="inline-form">
        <div class="form-group" style="flex:1;">
          <select id="tagCategorySelect">
            <option value="">カテゴリを選択</option>
          </select>
        </div>
        <div class="form-group" style="flex:1;">
          <input type="text" id="newTag" placeholder="新しいタグ名">
        </div>
        <button class="btn btn-primary" onclick="addTag()">追加</button>
      </div>
    </div>

    <div class="master-table-section">
      <h3>📋 登録済みカテゴリ・タグ一覧</h3>
      <div id="masterListContainer">
        <p class="loading">読み込み中...</p>
      </div>
    </div>
  </div>
</div>

<div class="page" id="page-customer">
  <div class="card">
    <h2>👥 顧客管理</h2>
    <div class="form-group">
      <label>顧客名</label>
      <input type="text" id="custName">
    </div>
    <div class="form-group">
      <label>担当者</label>
      <input type="text" id="custContact">
    </div>
    <div class="form-group">
      <label>メモ</label>
      <textarea id="custMemo" rows="2"></textarea>
    </div>
    <div class="btn-group">
      <button class="btn btn-primary" onclick="addCustomer()">新規登録</button>
      <button class="btn btn-success" onclick="updateCustomer()">更新</button>
    </div>
    <input type="hidden" id="editCID" value="">
  </div>
  <div class="card">
    <h2>📋 顧客一覧</h2>
    <table>
      <thead>
        <tr><th>CID</th><th>顧客名</th><th>担当者</th><th>メモ</th><th>操作</th></tr>
      </thead>
      <tbody id="customerTable"></tbody>
    </table>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://sheetdb.io/api/v1/16f9oq61xmnqu';

// ============ Navigation ============
function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  const navBtn = document.getElementById('nav-' + page);
  if (navBtn) navBtn.classList.add('active');
  if (page === 'customer') loadCustomers();
  if (page === 'master') loadMasterData();
}

// ============ Toast ============
function toast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 3000);
}

// ============ Customer ============
async function loadCustomers() {
  try {
    const res = await fetch(API + '?sheet=Customers');
    const data = await res.json();
    const tb = document.getElementById('customerTable');
    tb.innerHTML = '';
    data.forEach(c => {
      if (!c.CID) return;
      const memo = (c.Memo || '').replace(/'/g, "\\'");
      const name = (c.CustomerName || '').replace(/'/g, "\\'");
      const contact = (c.ContactPerson || '').replace(/'/g, "\\'");
      tb.innerHTML += `<tr>
        <td>${c.CID}</td><td>${c.CustomerName}</td><td>${c.ContactPerson}</td><td>${c.Memo || ''}</td>
        <td>
          <button class="btn btn-primary btn-sm" onclick="editCustomer('${c.CID}','${name}','${contact}','${memo}')">編集</button>
          <button class="btn btn-danger btn-sm" onclick="deleteCustomer('${c.CID}')">削除</button>
        </td>
      </tr>`;
    });
  } catch (e) { toast('顧客読込失敗', 'error'); }
}

async function addCustomer() {
  const name = document.getElementById('custName').value.trim();
  if (!name) { toast('顧客名を入力してください', 'error'); return; }
  try {
    const res = await fetch(API + '?sheet=Customers');
    const data = await res.json();
    let maxNum = 0;
    data.forEach(c => {
      if (c.CID) {
        const num = parseInt(c.CID.replace('C', ''));
        if (num > maxNum) maxNum = num;
      }
    });
    const newCID = 'C' + String(maxNum + 1).padStart(3, '0');
    await fetch(API + '?sheet=Customers', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ data: { CID: newCID, CustomerName: name, ContactPerson: document.getElementById('custContact').value.trim(), Memo: document.getElementById('custMemo').value.trim() } })
    });
    toast('顧客登録完了: ' + newCID);
    clearCustomerForm();
    loadCustomers();
  } catch (e) { toast('登録失敗', 'error'); }
}

function editCustomer(cid, name, contact, memo) {
  document.getElementById('editCID').value = cid;
  document.getElementById('custName').value = name;
  document.getElementById('custContact').value = contact;
  document.getElementById('custMemo').value = memo;
}

async function updateCustomer() {
  const cid = document.getElementById('editCID').value;
  if (!cid) { toast('編集する顧客を選択してください', 'error'); return; }
  try {
    await fetch(API + '/CID/' + cid + '?sheet=Customers', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ data: { CustomerName: document.getElementById('custName').value.trim(), ContactPerson: document.getElementById('custContact').value.trim(), Memo: document.getElementById('custMemo').value.trim() } })
    });
    toast('更新完了');
    clearCustomerForm();
    loadCustomers();
  } catch (e) { toast('更新失敗', 'error'); }
}

async function deleteCustomer(cid) {
  if (!confirm(cid + ' を削除しますか？')) return;
  try {
    await fetch(API + '/CID/' + cid + '?sheet=Customers', { method: 'DELETE' });
    toast('削除完了');
    loadCustomers();
  } catch (e) { toast('削除失敗', 'error'); }
}

function clearCustomerForm() {
  document.getElementById('editCID').value = '';
  document.getElementById('custName').value = '';
  document.getElementById('custContact').value = '';
  document.getElementById('custMemo').value = '';
}

// ============ Master (MID Based) ============
// Master sheet columns: MID, CategoryName, TagName
let masterRows = []; // {MID, CategoryName, TagName}

function getNextMID(data) {
  let maxNum = 0;
  data.forEach(r => {
    if (r.MID) {
      const num = parseInt(r.MID.replace('M', ''));
      if (!isNaN(num) && num > maxNum) maxNum = num;
    }
  });
  return 'M' + String(maxNum + 1).padStart(3, '0');
}

async function loadMasterData() {
  try {
    const res = await fetch(API + '?sheet=Master');
    const data = await res.json();
    masterRows = [];
    data.forEach(r => {
      if (r.MID && r.CategoryName) {
        masterRows.push({
          MID: r.MID,
          CategoryName: r.CategoryName,
          TagName: r.TagName || ''
        });
      }
    });
    updateCategorySelect();
    renderMasterList();
  } catch (e) { toast('マスタ読込失敗', 'error'); }
}

function updateCategorySelect() {
  const sel = document.getElementById('tagCategorySelect');
  const categories = [...new Set(masterRows.map(r => r.CategoryName))];
  sel.innerHTML = '<option value="">カテゴリを選択</option>';
  categories.forEach(c => {
    sel.innerHTML += `<option value="${c}">${c}</option>`;
  });
}

function renderMasterList() {
  const container = document.getElementById('masterListContainer');
  const categories = [...new Set(masterRows.map(r => r.CategoryName))];

  if (categories.length === 0) {
    container.innerHTML = '<p style="color:#999;">カテゴリが登録されていません。</p>';
    return;
  }

  let html = '';
  categories.forEach(cat => {
    const catRows = masterRows.filter(r => r.CategoryName === cat);
    const tags = catRows.filter(r => r.TagName);
    const esc = cat.replace(/'/g, "\\'");

    html += `<div class="category-group">`;
    html += `<div class="category-header">
      <span>📁 ${cat} (${tags.length}タグ)</span>
      <button class="btn btn-danger btn-sm" onclick="deleteCategory('${esc}')">カテゴリ削除</button>
    </div>`;
    html += `<div class="tag-list">`;

    if (tags.length === 0) {
      html += `<div class="no-tags">タグなし</div>`;
    } else {
      tags.forEach(t => {
        const tagEsc = t.TagName.replace(/'/g, "\\'");
        html += `<div class="tag-item">
          <span>🏷️ ${t.TagName} <small style="color:#aaa;">[${t.MID}]</small></span>
          <button class="btn btn-danger btn-sm" onclick="deleteTag('${t.MID}','${esc}')">削除</button>
        </div>`;
      });
    }
    html += `</div></div>`;
  });

  container.innerHTML = html;
}

// --- Category Add ---
async function addCategory() {
  const name = document.getElementById('newCategory').value.trim();
  if (!name) { toast('カテゴリ名を入力してください', 'error'); return; }
  const exists = masterRows.some(r => r.CategoryName === name);
  if (exists) { toast('既に存在するカテゴリです', 'error'); return; }
  try {
    const res = await fetch(API + '?sheet=Master');
    const data = await res.json();
    const newMID = getNextMID(data);
    await fetch(API + '?sheet=Master', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ data: { MID: newMID, CategoryName: name, TagName: '' } })
    });
    toast('カテゴリ追加完了: ' + newMID);
    document.getElementById('newCategory').value = '';
    loadMasterData();
  } catch (e) { toast('追加失敗', 'error'); }
}

// --- Category Delete (delete all MIDs for this category) ---
async function deleteCategory(cat) {
  if (!confirm('カテゴリ「' + cat + '」と全タグを削除しますか？')) return;
  try {
    const rows = masterRows.filter(r => r.CategoryName === cat);
    for (const row of rows) {
      await fetch(API + '/MID/' + row.MID + '?sheet=Master', { method: 'DELETE' });
    }
    toast('カテゴリ削除完了');
    loadMasterData();
  } catch (e) { toast('削除失敗', 'error'); }
}

// --- Tag Add ---
async function addTag() {
  const cat = document.getElementById('tagCategorySelect').value;
  const tag = document.getElementById('newTag').value.trim();
  if (!cat) { toast('カテゴリを選択してください', 'error'); return; }
  if (!tag) { toast('タグ名を入力してください', 'error'); return; }
  const exists = masterRows.some(r => r.CategoryName === cat && r.TagName === tag);
  if (exists) { toast('既に存在するタグです', 'error'); return; }

  try {
    // Check if there's an empty-tag row for this category
    const emptyRow = masterRows.find(r => r.CategoryName === cat && !r.TagName);

    if (emptyRow) {
      // Update existing empty row via MID
      await fetch(API + '/MID/' + emptyRow.MID + '?sheet=Master', {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ data: { TagName: tag } })
      });
      toast('タグ追加完了: ' + emptyRow.MID);
    } else {
      // Create new row with new MID
      const res = await fetch(API + '?sheet=Master');
      const data = await res.json();
      const newMID = getNextMID(data);
      await fetch(API + '?sheet=Master', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ data: { MID: newMID, CategoryName: cat, TagName: tag } })
      });
      toast('タグ追加完了: ' + newMID);
    }

    document.getElementById('newTag').value = '';
    loadMasterData();
  } catch (e) { toast('追加失敗', 'error'); }
}

// --- Tag Delete (by MID - pinpoint) ---
async function deleteTag(mid, cat) {
  if (!confirm('このタグを削除しますか？')) return;
  try {
    // Check if this is the last tag in the category
    const sameCatRows = masterRows.filter(r => r.CategoryName === cat);

    if (sameCatRows.length === 1) {
      // Last row - clear TagName to keep category alive
      await fetch(API + '/MID/' + mid + '?sheet=Master', {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ data: { TagName: '' } })
      });
    } else {
      // Multiple rows - safe to delete this MID row
      await fetch(API + '/MID/' + mid + '?sheet=Master', { method: 'DELETE' });
    }

    toast('タグ削除完了');
    loadMasterData();
  } catch (e) { toast('削除失敗', 'error'); }
}

// ============ Init ============
showPage('master');
</script>
</body>
</html>
